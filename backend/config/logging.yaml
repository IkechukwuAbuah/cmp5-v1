version: 1
disable_existing_loggers: false

formatters:
  structured:
    class: src.lib.logger.StructuredFormatter
  simple:
    format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: structured
    stream: ext://sys.stdout

  file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: structured
    filename: logs/app.log
    maxBytes: 10485760  # 10MB
    backupCount: 5
    encoding: utf-8

  error_file:
    class: logging.handlers.RotatingFileHandler
    level: ERROR
    formatter: structured
    filename: logs/error.log
    maxBytes: 10485760  # 10MB
    backupCount: 5
    encoding: utf-8

loggers:
  efl_agent:
    level: INFO
    handlers: [console, file]
    propagate: false

  efl_agent.api:
    level: DEBUG
    handlers: [console, file]
    propagate: false

  efl_agent.services:
    level: INFO
    handlers: [console, file]
    propagate: false

  efl_agent.middleware:
    level: INFO
    handlers: [console, file]
    propagate: false

  efl_agent.voice:
    level: INFO
    handlers: [console, file]
    propagate: false

  efl_agent.chat:
    level: INFO
    handlers: [console, file]
    propagate: false

  efl_agent.external_api:
    level: INFO
    handlers: [console, file]
    propagate: false

  uvicorn.access:
    level: INFO
    handlers: [console]
    propagate: false

  uvicorn.error:
    level: INFO
    handlers: [console, error_file]
    propagate: false

root:
  level: INFO
  handlers: [console, file]

# Environment-specific overrides
environments:
  development:
    loggers:
      efl_agent:
        level: DEBUG

  production:
    handlers:
      console:
        level: WARNING
    loggers:
      efl_agent:
        level: INFO
      efl_agent.api:
        level: INFO

  testing:
    handlers:
      console:
        level: ERROR
    loggers:
      efl_agent:
        level: DEBUG